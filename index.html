<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pincelada — Creador de contenido</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --stone-50: #fafaf9;
    --stone-100: #f5f5f4;
    --stone-200: #e7e5e4;
    --stone-400: #a8a29e;
    --stone-500: #78716c;
    --stone-600: #57534e;
    --stone-900: #292524;
    --gold: #b8905a;
    --gold-light: #d4b88a;
    --gold-dark: #8a6a3e;
    --brand-100: #f3ede2;
    --brand-dark: #5e4332;
    --ui-bg: #111;
    --ui-surface: #1a1a1a;
    --ui-border: #2a2a2a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--ui-bg);
    font-family: 'DM Sans', sans-serif;
    color: #ccc;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ====== TOP BAR ====== */
  .topbar {
    background: var(--ui-surface);
    border-bottom: 1px solid var(--ui-border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .topbar h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 400;
    color: var(--gold);
    letter-spacing: 0.06em;
  }

  .topbar .subtitle {
    font-size: 10px;
    color: var(--stone-500);
    margin-left: 10px;
  }

  .btn-download {
    background: var(--gold);
    color: var(--stone-900);
    border: none;
    padding: 10px 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
    border-radius: 2px;
  }

  .btn-download:hover { background: var(--gold-light); }
  .btn-download:active { transform: scale(0.97); }
  .btn-download.downloading { opacity: 0.6; pointer-events: none; }

  /* ====== DESKTOP LAYOUT ====== */
  .layout {
    display: flex;
    min-height: calc(100vh - 52px);
  }

  /* ====== SIDEBAR ====== */
  .sidebar {
    width: 320px;
    background: var(--ui-surface);
    border-right: 1px solid var(--ui-border);
    padding: 20px;
    overflow-y: auto;
    flex-shrink: 0;
  }

  .sidebar h2 {
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--stone-500);
    margin-bottom: 10px;
  }

  .template-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
    margin-bottom: 24px;
  }

  .template-btn {
    background: var(--ui-bg);
    border: 2px solid var(--ui-border);
    color: #aaa;
    padding: 10px 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    line-height: 1.4;
  }

  .template-btn:hover { border-color: var(--stone-500); color: #fff; }
  .template-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(184,144,90,0.06); }

  .variant-row {
    display: flex;
    gap: 6px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .variant-btn {
    flex: 1;
    min-width: 60px;
    background: var(--ui-bg);
    border: 1px solid var(--ui-border);
    color: #888;
    padding: 7px 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }

  .variant-btn:hover { border-color: var(--stone-500); }
  .variant-btn.active { border-color: var(--gold); color: var(--gold); }

  .field-group { margin-bottom: 16px; }

  .field-group label {
    display: block;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--stone-500);
    margin-bottom: 5px;
  }

  .field-group input,
  .field-group textarea {
    width: 100%;
    background: var(--ui-bg);
    border: 1px solid var(--ui-border);
    color: #ddd;
    padding: 9px 11px;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    border-radius: 2px;
    -webkit-appearance: none;
  }

  .field-group input:focus,
  .field-group textarea:focus { border-color: var(--gold); box-shadow: 0 0 0 2px rgba(184,144,90,0.2); }

  .field-group textarea { resize: vertical; min-height: 60px; line-height: 1.5; }

  .image-upload {
    width: 100%;
    height: 70px;
    background: var(--ui-bg);
    border: 2px dashed var(--ui-border);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
    border-radius: 2px;
  }

  .image-upload:hover { border-color: var(--stone-500); }
  .image-upload span { font-size: 12px; color: var(--stone-500); }
  .image-upload input { position: absolute; inset: 0; opacity: 0; cursor: pointer; font-size: 16px; }
  .image-upload.has-image { border-style: solid; border-color: var(--gold); }
  .image-upload.has-image span { color: var(--gold); }

  /* ====== CANVAS AREA ====== */
  .canvas-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 30px;
  }

  .canvas-wrapper { position: relative; }

  .canvas-size-label {
    position: absolute;
    top: -22px;
    left: 0;
    font-size: 10px;
    color: var(--stone-600);
    letter-spacing: 0.05em;
  }

  /* ====== RENDER FRAME — always rendered at native px, scaled visually ====== */
  .render-frame {
    width: 540px;
    height: 675px;
    transform-origin: top left;
    position: relative;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  .render-frame.story-size {
    width: 405px;
    height: 720px;
  }

  /* ====== MOBILE ====== */
  @media (max-width: 860px) {
    .topbar .subtitle { display: none; }
    .topbar h1 { font-size: 16px; }
    .btn-download { padding: 9px 16px; font-size: 12px; }

    .layout {
      flex-direction: column;
    }

    .sidebar {
      width: 100%;
      border-right: none;
      border-top: 1px solid var(--ui-border);
      padding: 16px;
      order: 2;
    }

    .canvas-area {
      order: 1;
      padding: 0;
      flex: none;
      display: block;
    }

    .canvas-wrapper {
      width: 100%;
      overflow: hidden;
    }

    .render-frame {
      box-shadow: none;
    }

    .canvas-size-label { display: none; }

    .template-grid {
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
    }

    .template-btn { padding: 8px 4px; font-size: 9px; }

    .section-divider {
      height: 1px;
      background: var(--ui-border);
      margin: 16px 0;
    }
  }

  /* ====== ACTUAL TEMPLATE STYLES ====== */
  .tpl {
    width: 100%;
    height: 100%;
    position: relative;
    overflow: hidden;
    font-family: 'DM Sans', sans-serif;
  }

  .linen {
    background-image: url("data:image/svg+xml,%3Csvg width='400' height='400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  }

  .linen-dark {
    background-image: url("data:image/svg+xml,%3Csvg width='400' height='400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  }

  .brand-tag {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--gold);
  }

  .gold-line {
    height: 1px;
    background: var(--gold);
    opacity: 0.4;
  }

  .handle-bottom {
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--gold);
    opacity: 0.5;
    position: absolute;
    bottom: 44px;
    left: 50%;
    transform: translateX(-50%);
  }

  /* -- Quote -- */
  .tpl-quote { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 60px 48px; }
  .tpl-quote.light { background: var(--brand-100); }
  .tpl-quote.dark { background: var(--stone-900); }
  .tpl-quote .gold-wash { position: absolute; top: 0; left: 0; width: 100%; height: 35%; pointer-events: none; }
  .tpl-quote.light .gold-wash { background: radial-gradient(ellipse at 30% 0%, rgba(184,144,90,0.12) 0%, transparent 70%); }
  .tpl-quote.dark .gold-wash { background: radial-gradient(ellipse at 70% 100%, rgba(184,144,90,0.08) 0%, transparent 60%); }
  .tpl-quote .brand-tag { position: absolute; top: 52px; }
  .tpl-quote .quote-text { font-family: 'Cormorant Garamond', serif; font-size: 40px; font-weight: 400; line-height: 1.35; max-width: 440px; }
  .tpl-quote.light .quote-text { color: var(--stone-900); }
  .tpl-quote.dark .quote-text { color: var(--brand-100); }
  .tpl-quote .quote-bold { font-weight: 700; }

  /* -- Photo overlay -- */
  .tpl-photo { display: flex; flex-direction: column; }
  .tpl-photo .photo-section { flex: 1; background-size: cover; background-position: center; position: relative; }
  .tpl-photo .photo-gradient { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(0,0,0,0) 50%, rgba(0,0,0,0.6) 100%); }
  .tpl-photo .photo-overlay-text { position: absolute; bottom: 30px; left: 30px; right: 30px; font-family: 'Cormorant Garamond', serif; font-size: 34px; font-weight: 400; color: #fff; line-height: 1.3; text-shadow: 0 2px 12px rgba(0,0,0,0.5); }
  .tpl-photo .info-bar { height: 170px; background: var(--brand-100); display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 8px; }
  .tpl-photo .info-bar .loc-main { font-family: 'Cormorant Garamond', serif; font-size: 28px; color: var(--stone-900); }
  .tpl-photo .info-bar .loc-sub { font-size: 14px; color: var(--stone-600); }
  .tpl-photo .info-bar .brand-tag { font-size: 11px; margin-top: 6px; }
  .tpl-photo-top .top-bar { height: 160px; background: var(--brand-100); display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 10px; }
  .tpl-photo-top .top-bar .title-text { font-family: 'Cormorant Garamond', serif; font-size: 30px; font-weight: 400; color: var(--stone-900); text-align: center; padding: 0 20px; }
  .tpl-photo-top .photo-full { flex: 1; background-size: cover; background-position: center; }

  /* -- Artist -- */
  .tpl-artist { display: flex; flex-direction: column; }
  .tpl-artist.dark { background: var(--stone-900); }
  .tpl-artist.light { background: var(--brand-100); }
  .tpl-artist .artist-photo { height: 400px; background-size: cover; background-position: center; position: relative; }
  .tpl-artist.dark .artist-photo::after { content: ''; position: absolute; inset: 0; background: linear-gradient(180deg, transparent 60%, var(--stone-900) 100%); }
  .tpl-artist.light .artist-photo::after { content: ''; position: absolute; inset: 0; background: linear-gradient(180deg, transparent 60%, var(--brand-100) 100%); }
  .tpl-artist .artist-info { flex: 1; padding: 0 40px 40px; display: flex; flex-direction: column; justify-content: center; gap: 6px; }
  .tpl-artist .artist-info .tag { font-size: 12px; letter-spacing: 0.35em; text-transform: uppercase; color: var(--gold); margin-bottom: 10px; }
  .tpl-artist .artist-info .name { font-family: 'Cormorant Garamond', serif; font-size: 44px; font-weight: 400; line-height: 1.15; }
  .tpl-artist.dark .artist-info .name { color: var(--brand-100); }
  .tpl-artist.light .artist-info .name { color: var(--stone-900); }
  .tpl-artist .artist-info .technique { font-size: 17px; margin-top: 2px; }
  .tpl-artist.dark .artist-info .technique { color: var(--stone-400); }
  .tpl-artist.light .artist-info .technique { color: var(--stone-600); }
  .tpl-artist .artist-info .quote { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-style: italic; line-height: 1.5; margin-top: 16px; padding-left: 16px; border-left: 3px solid var(--gold); }
  .tpl-artist.dark .artist-info .quote { color: var(--stone-400); }
  .tpl-artist.light .artist-info .quote { color: var(--stone-600); }

  /* -- Announce -- */
  .tpl-announce { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 60px 40px; }
  .tpl-announce.light { background: var(--brand-100); }
  .tpl-announce.dark { background: var(--stone-900); }
  .tpl-announce .gold-stripe { position: absolute; top: 0; left: 0; right: 0; height: 8px; background: linear-gradient(90deg, var(--gold), var(--gold-light), transparent); }
  .tpl-announce .brand-tag { position: absolute; top: 44px; }
  .tpl-announce .badge { font-size: 14px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold-dark); background: rgba(184,144,90,0.12); padding: 8px 22px; margin-bottom: 28px; }
  .tpl-announce .title { font-family: 'Cormorant Garamond', serif; font-size: 42px; font-weight: 400; line-height: 1.3; max-width: 420px; }
  .tpl-announce.light .title { color: var(--stone-900); }
  .tpl-announce.dark .title { color: var(--brand-100); }
  .tpl-announce .body { font-size: 17px; line-height: 1.7; margin-top: 22px; max-width: 380px; }
  .tpl-announce.light .body { color: var(--stone-600); }
  .tpl-announce.dark .body { color: var(--stone-400); }
  .tpl-announce .cta-btn { margin-top: 32px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; padding: 14px 36px; border: none; cursor: default; }
  .tpl-announce.light .cta-btn { background: var(--stone-900); color: var(--brand-100); }
  .tpl-announce.dark .cta-btn { background: var(--gold); color: var(--stone-900); }

  /* -- Blog -- */
  .tpl-blog { display: flex; flex-direction: column; }
  .tpl-blog.dark { background: var(--stone-900); }
  .tpl-blog.light { background: var(--brand-100); }
  .tpl-blog .blog-content { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 60px 40px; gap: 16px; }
  .tpl-blog .blog-content .tag { font-size: 13px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold); }
  .tpl-blog .blog-content .type-badge { font-size: 14px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gold-dark); background: rgba(184,144,90,0.1); padding: 6px 16px; align-self: flex-start; }
  .tpl-blog .blog-content .blog-title { font-family: 'Cormorant Garamond', serif; font-size: 38px; font-weight: 400; line-height: 1.3; }
  .tpl-blog.dark .blog-content .blog-title { color: var(--brand-100); }
  .tpl-blog.light .blog-content .blog-title { color: var(--stone-900); }
  .tpl-blog .blog-content .excerpt { font-size: 16px; line-height: 1.7; }
  .tpl-blog.dark .blog-content .excerpt { color: var(--stone-400); }
  .tpl-blog.light .blog-content .excerpt { color: var(--stone-600); }
  .tpl-blog .blog-content .url { font-size: 13px; color: var(--stone-500); margin-top: 4px; }
  .tpl-blog .blog-bar { padding: 28px 40px; display: flex; align-items: center; justify-content: space-between; }
  .tpl-blog.dark .blog-bar { background: rgba(184,144,90,0.06); border-top: 1px solid rgba(184,144,90,0.15); }
  .tpl-blog.light .blog-bar { background: rgba(41,37,36,0.04); border-top: 1px solid var(--stone-200); }
  .tpl-blog .blog-bar .cta-text { font-size: 15px; font-weight: 500; letter-spacing: 0.05em; }
  .tpl-blog.dark .blog-bar .cta-text { color: var(--gold-light); }
  .tpl-blog.light .blog-bar .cta-text { color: var(--stone-900); }
  .tpl-blog .blog-bar .arrow { font-size: 24px; color: var(--gold); }
</style>
</head>
<body>

<div class="topbar">
  <div style="display:flex;align-items:baseline;">
    <h1>Pincelada</h1>
    <span class="subtitle">Creador de contenido</span>
  </div>
  <button class="btn-download" id="downloadBtn" onclick="downloadPNG()">
    <span id="dlText">Descargar PNG</span>
  </button>
</div>

<div class="layout">

  <!-- CANVAS — comes first in DOM, shows on top on mobile -->
  <div class="canvas-area" id="canvasArea">
    <div class="canvas-wrapper" id="canvasWrapper">
      <div class="canvas-size-label" id="sizeLabel">1080 × 1350 px (4:5)</div>
      <div class="render-frame" id="renderFrame"></div>
    </div>
  </div>

  <!-- SIDEBAR — below on mobile, left on desktop -->
  <div class="sidebar" id="sidebar">

    <h2>Template</h2>
    <div class="template-grid" id="templateGrid">
      <button class="template-btn active" data-tpl="quote">Quote / Frase</button>
      <button class="template-btn" data-tpl="photo">Foto + Overlay</button>
      <button class="template-btn" data-tpl="artist">Artista</button>
      <button class="template-btn" data-tpl="announce">Anuncio</button>
      <button class="template-btn" data-tpl="blog">Blog / Guía</button>
      <button class="template-btn" data-tpl="dato">Dato / Número</button>
      <button class="template-btn" data-tpl="portada">Portada Carrusel</button>
      <button class="template-btn" data-tpl="cierre">Cierre Carrusel</button>
      <button class="template-btn" data-tpl="beforeafter">Antes / Después</button>
      <button class="template-btn" data-tpl="testimonial">Testimonial</button>
      <button class="template-btn" data-tpl="story">Historia (9:16)</button>
      <button class="template-btn" data-tpl="pregunta">Pregunta (9:16)</button>
      <button class="template-btn" data-tpl="storyCta">Story CTA</button>
      <button class="template-btn" data-tpl="storyArtist">Story Artista</button>
      <button class="template-btn" data-tpl="storyProcess">Story Proceso</button>
      <button class="template-btn" data-tpl="storyDato">Story Dato</button>
      <button class="template-btn" data-tpl="storyReveal">Story Reveal</button>
      <button class="template-btn" data-tpl="storyEditorial">Story Editorial</button>
    </div>

    <h2 style="margin-top:8px;">Slides Carrusel</h2>
    <div class="template-grid" id="setGrid">
      <button class="template-btn" data-tpl="slideBold">Texto Bold</button>
      <button class="template-btn" data-tpl="slideLista">Lista</button>
      <button class="template-btn" data-tpl="slidePaso">Paso</button>
      <button class="template-btn" data-tpl="slideVs">VS</button>
      <button class="template-btn" data-tpl="slideSeparador">Separador</button>
    </div>

    <h2>Variante</h2>
    <div class="variant-row" id="variantRow"></div>

    <div id="fieldsContainer"></div>

  </div>
</div>

<script>
const TEMPLATES = {
  quote: {
    name: 'Quote / Frase',
    variants: ['light', 'dark'],
    ratio: 'post',
    fields: [
      { id: 'line1', label: 'Línea 1', type: 'text', default: 'Montevideo tiene un museo' },
      { id: 'line2', label: 'Línea 2 (negrita)', type: 'text', default: 'que nadie cobra entrada' },
    ],
    render: (f, v) => `
      <div class="tpl tpl-quote ${v} ${v === 'light' ? 'linen' : 'linen-dark'}">
        <div class="gold-wash"></div>
        <span class="brand-tag">P I N C E L A D A &nbsp; U Y</span>
        <div class="gold-line" style="width:180px;margin-bottom:36px;"></div>
        <div class="quote-text">${esc(f.line1)}<br><span class="quote-bold">${esc(f.line2)}</span></div>
        <div class="gold-line" style="width:180px;margin-top:36px;"></div>
        <span class="handle-bottom">@pincelada.uy</span>
      </div>`
  },

  photo: {
    name: 'Foto + Overlay',
    variants: ['bottom', 'top'],
    ratio: 'post',
    fields: [
      { id: 'image', label: 'Foto', type: 'image' },
      { id: 'overlay', label: 'Texto sobre foto', type: 'text', default: 'Barrio Sur también se mira así' },
      { id: 'location', label: 'Ubicación', type: 'text', default: 'Barrio Sur, Montevideo' },
      { id: 'detail', label: 'Detalle', type: 'text', default: 'Mural sobre Isla de Flores' },
    ],
    render: (f, v) => {
      const bg = f._imageData || 'linear-gradient(135deg, #333, #555)';
      const bgStyle = f._imageData ? `url('${bg}') center/cover` : bg;
      if (v === 'top') {
        return `
        <div class="tpl tpl-photo tpl-photo-top" style="display:flex;flex-direction:column;">
          <div class="top-bar linen">
            <span class="brand-tag" style="font-size:11px;">P I N C E L A D A &nbsp; U Y</span>
            <div class="title-text">${esc(f.overlay)}</div>
            <div class="gold-line" style="width:120px;"></div>
          </div>
          <div class="photo-full" style="background:${bgStyle};"></div>
        </div>`;
      }
      return `

          <div style="display:flex;align-items:baseline;gap:20px;margin-bottom:20px;">
            <div style="font-family:'Cormorant Garamond',serif;font-size:96px;font-weight:300;color:var(--gold);line-height:0.85;letter-spacing:-0.03em;">${esc(f.step)}</div>
            <div>
              <div style="font-size:10px;letter-spacing:0.25em;text-transform:uppercase;color:var(--gold);margin-bottom:6px;">${esc(f.kicker)}</div>
              <div style="font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:400;color:var(--brand-100);line-height:1.2;">${esc(f.title)}</div>
            </div>
          </div>
          <div class="gold-line" style="width:60px;margin-bottom:24px;"></div>
          <div style="font-size:17px;color:var(--stone-400);line-height:1.7;max-width:420px;">${esc(f.body)}</div>
          <span class="handle-bottom">@pincelada.uy</span>
        </div>`;
      }

      if (v === 'centrado') {
        /* Dark, giant number centered top, text below */
        return `
        <div class="tpl linen-dark" style="display:flex;flex-direction:column;align-items:center;text-align:center;padding:50px 40px;background:var(--stone-900);">
          <div style="position:absolute;top:0;left:50%;transform:translateX(-50%);width:300px;height:200px;background:radial-gradient(ellipse at center top,rgba(184,144,90,0.1) 0%,transparent 70%);pointer-events:none;"></div>
          <span class="brand-tag" style="font-size:10px;margin-bottom:20px;">P I N C E L A D A &nbsp; U Y</span>
          <div style="font-size:10px;letter-spacing:0.25em;text-transform:uppercase;color:var(--gold);margin-bottom:8px;">${esc(f.kicker)}</div>
          <div style="font-family:'Cormorant Garamond',serif;font-size:140px;font-weight:300;color:var(--gold);line-height:0.85;letter-spacing:-0.04em;opacity:0.9;">${esc(f.step)}</div>
          <div class="gold-line" style="width:60px;margin:20px 0;"></div>
          <div style="font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:400;color:var(--brand-100);line-height:1.25;max-width:400px;">${esc(f.title)}</div>
          <div style="font-size:16px;color:var(--stone-400);line-height:1.7;margin-top:20px;max-width:380px;">${esc(f.body)}</div>
          <span class="handle-bottom">@pincelada.uy</span>
        </div>`;
      }

      if (v === 'foto') {
        /* Image background with step number overlay */
        return `
        <div class="tpl" style="display:flex;flex-direction:column;background:#111;">
          <div style="height:55%;background:${bgStyle};background-size:cover;background-position:center;position:relative;">
            <div style="position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0.2) 0%,rgba(0,0,0,0) 30%,rgba(17,17,17,0.9) 100%);"></div>
            <div style="position:absolute;top:36px;left:32px;">
              <span class="brand-tag" style="font-size:10px;">P I N C E L A D A &nbsp; U Y</span>
            </div>
            <div style="position:absolute;top:32px;right:32px;font-family:'Cormorant Garamond',serif;font-size:72px;font-weight:300;color:var(--gold);opacity:0.6;line-height:1;">${esc(f.step)}</div>
          </div>
          <div style="flex:1;padding:20px 36px 50px;display:flex;flex-direction:column;justify-content:center;background:#111;">
            <div style="font-size:10px;letter-spacing:0.25em;text-transform:uppercase;color:var(--gold);margin-bottom:10px;">${esc(f.kicker)}</div>
            <div style="font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:400;color:var(--brand-100);line-height:1.25;">${esc(f.title)}</div>
            <div class="gold-line" style="width:40px;margin:16px 0;"></div>
            <div style="font-size:15px;color:var(--stone-400);line-height:1.7;">${esc(f.body)}</div>
          </div>
        </div>`;
      }

      /* limpio — light, elegant, small number */
      return `
      <div class="tpl linen" style="display:flex;flex-direction:column;justify-content:center;padding:60px 48px;background:var(--brand-100);">
        <span class="brand-tag" style="position:absolute;top:44px;right:44px;font-size:10px;">P I N C E L A D A &nbsp; U Y</span>
        <div style="display:flex;align-items:center;gap:16px;margin-bottom:24px;">
          <div style="width:52px;height:52px;border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:400;color:var(--gold);">${esc(f.step)}</div>
          <div style="font-size:10px;letter-spacing:0.25em;text-transform:uppercase;color:var(--gold);">${esc(f.kicker)}</div>
        </div>
        <div style="font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:400;color:var(--stone-900);line-height:1.25;max-width:420px;">${esc(f.title)}</div>
        <div class="gold-line" style="width:60px;margin:24px 0;"></div>
        <div style="font-size:17px;color:var(--stone-600);line-height:1.7;max-width:420px;">${esc(f.body)}</div>
        <span class="handle-bottom">@pincelada.uy</span>
      </div>`;
    }
  },

  slideVs: {
    name: 'VS',
    variants: ['dark', 'light'],
    ratio: 'post',
    fields: [
      { id: 'kicker', label: 'Kicker', type: 'text', default: 'La diferencia' },
      { id: 'left', label: 'Opción izquierda', type: 'text', default: 'Un print de\nuna cadena' },
      { id: 'right', label: 'Opción derecha', type: 'text', default: 'Una obra hecha\npara vos' },
      { id: 'body', label: 'Remate (opcional)', type: 'text', default: 'Una decora. La otra cuenta una historia.' },
    ],
    render: (f, v) => {
      const isDark = v === 'dark';
      const bodyHTML = f.body ? `<div style="font-size:15px;color:${isDark ? 'var(--stone-400)' : 'var(--stone-600)'};text-align:center;margin-top:28px;max-width:360px;line-height:1.6;font-style:italic;">${esc(f.body)}</div>` : '';
      return `
      <div class="tpl ${isDark ? 'linen-dark' : 'linen'}" style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 36px;background:${isDark ? 'var(--stone-900)' : 'var(--brand-100)'};">
        <span class="brand-tag" style="position:absolute;top:44px;font-size:10px;">P I N C E L A D A &nbsp; U Y</span>
        <div style="font-size:11px;letter-spacing:0.3em;text-transform:uppercase;color:var(--gold);margin-bottom:36px;">${esc(f.kicker)}</div>
        <div style="display:flex;align-items:center;gap:24px;width:100%;max-width:440px;">
          <div style="flex:1;padding:28px 16px;text-align:center;${isDark ? 'background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);' : 'background:rgba(41,37,36,0.04);border:1px solid var(--stone-200);'}">
            <div style="font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:400;color:${isDark ? 'var(--stone-400)' : 'var(--stone-500)'};line-height:1.35;">${esc(f.left).replace(/\n/g, '<br>')}</div>
          </div>
          <div style="font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;color:var(--gold);">vs</div>
          <div style="flex:1;padding:28px 16px;text-align:center;border:2px solid var(--gold);${isDark ? 'background:rgba(184,144,90,0.06);' : 'background:rgba(184,144,90,0.08);'}">
            <div style="font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:400;color:${isDark ? 'var(--brand-100)' : 'var(--stone-900)'};line-height:1.35;">${esc(f.right).replace(/\n/g, '<br>')}</div>
          </div>
        </div>
        ${bodyHTML}
        <span class="handle-bottom">@pincelada.uy</span>
      </div>`;
    }
  },

  slideSeparador: {
    name: 'Separador',
    variants: ['dark', 'light'],
    ratio: 'post',
    fields: [
      { id: 'text', label: 'Texto corto', type: 'text', default: 'Ahora imaginá esto.' },
    ],
    render: (f, v) => {
      const isDark = v === 'dark';
      return `
      <div class="tpl ${isDark ? 'linen-dark' : 'linen'}" style="display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:60px 44px;background:${isDark ? 'var(--stone-900)' : 'var(--brand-100)'};">
        <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(184,144,90,${isDark ? '0.06' : '0.1'}) 0%,transparent 70%);pointer-events:none;"></div>
        <span class="brand-tag" style="position:absolute;top:44px;font-size:10px;">P I N C E L A D A &nbsp; U Y</span>
        <div class="gold-line" style="width:100px;margin-bottom:36px;"></div>
        <div style="font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:400;font-style:italic;color:${isDark ? 'var(--brand-100)' : 'var(--stone-900)'};line-height:1.4;max-width:380px;">${esc(f.text)}</div>
        <div class="gold-line" style="width:100px;margin-top:36px;"></div>
        <span class="handle-bottom">@pincelada.uy</span>
      </div>`;
    }
  }
};

let currentTpl = 'quote';
let currentVar = 'light';
let fieldValues = {};
let imageData = null;
let imageData2 = null;

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

function isMobile() { return window.innerWidth <= 860; }

function init() {
  const allBtns = document.querySelectorAll('.template-btn');
  allBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      allBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentTpl = btn.dataset.tpl;
      imageData = null;
      imageData2 = null;
      setupVariants();
      setupFields();
      render();
      updateMobileScale();
    });
  });
  setupVariants();
  setupFields();
  render();
  updateMobileScale();
  window.addEventListener('resize', updateMobileScale);
}

function setupVariants() {
  const tpl = TEMPLATES[currentTpl];
  const row = document.getElementById('variantRow');
  row.innerHTML = '';
  tpl.variants.forEach((v, i) => {
    const btn = document.createElement('button');
    btn.className = 'variant-btn' + (i === 0 ? ' active' : '');
    btn.dataset.var = v;
    btn.textContent = v.charAt(0).toUpperCase() + v.slice(1);
    btn.addEventListener('click', () => {
      row.querySelectorAll('.variant-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentVar = v;
      render();
    });
    row.appendChild(btn);
  });
  currentVar = tpl.variants[0];

  const frame = document.getElementById('renderFrame');
  const label = document.getElementById('sizeLabel');
  if (tpl.ratio === 'story') {
    frame.className = 'render-frame story-size';
    label.textContent = '1080 × 1920 px (9:16)';
  } else {
    frame.className = 'render-frame';
    label.textContent = '1080 × 1350 px (4:5)';
  }
}

function setupFields() {
  const tpl = TEMPLATES[currentTpl];
  const container = document.getElementById('fieldsContainer');
  container.innerHTML = '';
  fieldValues = {};

  tpl.fields.forEach(f => {
    fieldValues[f.id] = f.default || '';
    const group = document.createElement('div');
    group.className = 'field-group';

    const label = document.createElement('label');
    label.textContent = f.label;
    group.appendChild(label);

    if (f.type === 'image' || f.type === 'image2') {
      const upload = document.createElement('div');
      upload.className = 'image-upload';
      upload.innerHTML = '<span>Tocá para subir imagen</span><input type="file" accept="image/*">';
      const isSecond = f.type === 'image2';
      upload.querySelector('input').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (ev) => {
            if (isSecond) { imageData2 = ev.target.result; }
            else { imageData = ev.target.result; }
            upload.classList.add('has-image');
            upload.querySelector('span').textContent = file.name;
            render();
          };
          reader.readAsDataURL(file);
        }
      });
      group.appendChild(upload);
    } else if (f.type === 'textarea') {
      const ta = document.createElement('textarea');
      ta.value = f.default || '';
      ta.addEventListener('input', () => { fieldValues[f.id] = ta.value; render(); });
      group.appendChild(ta);
    } else {
      const input = document.createElement('input');
      input.type = 'text';
      input.value = f.default || '';
      input.addEventListener('input', () => { fieldValues[f.id] = input.value; render(); });
      group.appendChild(input);
    }

    container.appendChild(group);
  });
}

function render() {
  const tpl = TEMPLATES[currentTpl];
  const f = { ...fieldValues };
  if (imageData) f._imageData = imageData;
  if (imageData2) f._imageData2 = imageData2;
  document.getElementById('renderFrame').innerHTML = tpl.render(f, currentVar);
}

/* Scale the render frame to fit viewport on mobile */
function updateMobileScale() {
  const frame = document.getElementById('renderFrame');
  const wrapper = document.getElementById('canvasWrapper');

  if (!isMobile()) {
    frame.style.transform = '';
    wrapper.style.width = '';
    wrapper.style.height = '';
    return;
  }

  const tpl = TEMPLATES[currentTpl];
  const isStory = tpl.ratio === 'story';
  const nativeW = isStory ? 405 : 540;
  const nativeH = isStory ? 720 : 675;

  // Use FULL viewport width, no padding
  const viewportW = window.innerWidth;
  const scale = viewportW / nativeW;

  frame.style.transform = `scale(${scale})`;
  frame.style.transformOrigin = 'top left';

  // Wrapper reflects the visible size so layout flows correctly
  wrapper.style.width = viewportW + 'px';
  wrapper.style.height = Math.round(nativeH * scale) + 'px';
}

async function downloadPNG() {
  const btn = document.getElementById('downloadBtn');
  const txt = document.getElementById('dlText');
  btn.classList.add('downloading');
  txt.textContent = 'Generando...';

  const tpl = TEMPLATES[currentTpl];
  const isStory = tpl.ratio === 'story';
  const targetW = 1080;

  const frame = document.getElementById('renderFrame');

  // Temporarily reset scale for clean capture
  const prevTransform = frame.style.transform;
  frame.style.transform = 'none';

  const nativeW = isStory ? 405 : 540;
  const nativeH = isStory ? 720 : 675;
  const captureScale = targetW / nativeW;

  try {
    const canvas = await html2canvas(frame, {
      scale: captureScale,
      useCORS: true,
      allowTaint: true,
      backgroundColor: null,
      width: nativeW,
      height: nativeH,
    });

    const link = document.createElement('a');
    link.download = `pincelada-${currentTpl}-${currentVar}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch (err) {
    console.error('Export error:', err);
    alert('Error al exportar. Intentá de nuevo.');
  }

  frame.style.transform = prevTransform;
  btn.classList.remove('downloading');
  txt.textContent = 'Descargar PNG';
}

init();
</script>
